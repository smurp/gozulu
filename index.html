<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000033">
  <title>Go Zulu</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
</head>
<body>
  <div class="container">
    <div id="zulu-time" class="time-display">00:00:00Z</div>
    
    <div id="clock">
      <div id="earth-container">
        <div id="earth-image" style="transform: rotate(-135deg);"></div>
        <div id="terminator"></div>
        <div id="sun-position"></div>
        <div id="user-location-pin">
          <div class="pin-point"></div>
          <div class="pin-pulse"></div>
        </div>
      </div>
      
      <div id="hour-marks"></div>
      
      <!-- Greenwich meridian line removed -->
    </div>
    
    <!-- Local time is now positioned dynamically via JavaScript -->
  </div>

  <script src="app.js"></script>
  <script>
    // Register service worker for PWA functionality
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then(reg => console.log('Service Worker registered', reg))
        .catch(err => console.error('Service Worker registration failed', err));
    }
  </script>
</body>
</html>
