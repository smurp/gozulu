<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Basic right-angled triangle - rotated 270 degrees (or -90 degrees) to have right angle at bottom left -->
  <g transform="rotate(270, 50, 50)">
    <!-- Triangle with rounded corners -->
    <path d="M 10,0 
             L 90,0 
             A 10,10 0 0 1 100,10 
             L 10,100 
             A 10,10 0 0 1 0,90 
             L 0,10 
             A 10,10 0 0 1 10,0 
             Z" 
          fill="#5D4037" />
    
    <!-- Text "Fund❤️" positioned further to the left -->
    <text x="25" y="50"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
          font-size="20" 
          font-weight="bold" 
          fill="#FFFFFF" 
          text-anchor="middle"
          transform="rotate(135, 25, 50)">
      Fund❤️
    </text>
  </g>
</svg>